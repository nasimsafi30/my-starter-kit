name: CI

on:
  push:
    branches: [main, master]

env:
  NODE_ENV: production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install typescript --save-dev
      - run: npm install
      - run: npm run build